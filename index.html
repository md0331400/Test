<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Beautiful! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans- serif;
            padding: 20px;
        }

        /* ব্যাকগ্রাউন্ড হার্ট অ্যানিমেশন */
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .hearts li {
            position: absolute;
            list-style: none;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 75, 110, 0.2);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 50%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 10%; }
        }

        .hearts li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .hearts li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .hearts li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .hearts li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .hearts li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .hearts li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 2px solid #ffdeeb;
            backdrop-filter: blur(5px);
            animation: cardPop 0.5s ease-out;
        }

        @keyframes cardPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .img-container {
            font-size: 70px;
            margin-bottom: 20px;
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #ff477e;
            font-family: 'Pacifico', cursive;
            font-size: 36px;
            margin-bottom: 35px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-family: 'Poppins', sans-serif;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff477e, #ff85a2);
            color: white;
        }

        .btn-yes:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.5);
        }

        .btn-no {
            background-color: #f1f2f6;
            color: #57606f;
        }

        .btn-no:hover {
            background-color: #dfe4ea;
        }

        /* নো পেজের স্টাইল */
        .no-page {
            display: none;
        }

        .broken-heart {
            font-size: 70px;
            color: #747d8c;
            margin-bottom: 20px;
        }

        .no-page h1 {
            color: #57606f;
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .cry-emoji {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .reason {
            background: #fff0f3;
            padding: 20px;
            border-radius: 15px;
            color: #ff477e;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.6;
            border-left: 5px solid #ff85a2;
            margin-bottom: 15px;
        }

        .redirect-text {
            font-size: 13px;
            color: #a4b0be;
            font-style: italic;
        }
    </style>
</head>
<body>

    <ul class="hearts">
        <li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="card" id="mainPage">
        <div class="img-container">💖</div>
        <h1>Are you love me?</h1>
        <div class="btn-container">
            <button class="btn-yes" onclick="selectYes()">Yes, I Do!</button>
            <button class="btn-no" onclick="selectNo()">No...</button>
        </div>
    </div>

    <div class="card no-page" id="noPage">
        <div class="broken-heart">💔</div>
        <h1>Oh No...!</h1>
        <div class="cry-emoji">😭😭😭</div>
        <div class="reason">
            আমি ভাবতেই পারছি না তুমি আমাকে না বলে দিলে! আমার মনটা পুরোপুরি ভেঙে গেল। 🥺
        </div>
        <p class="redirect-text">Redirecting in a moment...</p>
    </div>

    <script>
        // Yes ক্লিক করলে আপনার দেওয়া মূল লিংকে যাবে
        function selectYes() {
            window.location.href = "https://casajoys.com/mfac6yd6";
        }

        // No ক্লিক করলে ইমোশনাল পেজ দেখাবে এবং ৩ সেকেন্ড পর অন্য লিংকে যাবে
        function selectNo() {
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('noPage').style.display = 'block';
            
            // ৩০০০ মিলিসেকেন্ড = ৩ সেকেন্ড
            setTimeout(function() {
                // নিচের কোটেশনের (" ") ভেতর আপনার কাঙ্ক্ষিত 'No' এর লিংকটি বসিয়ে দিন
                window.location.href = "https://xhamster.com/videos/sensual-amateur-couple-sex-cutie-gets-a-perfect-fuck-and-an-amazing-creampie-instead-of-reading-xhcWEcc"; 
            }, 3000);
        }
    </script>

</body>
</html>
